<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ASAG Studio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=Fraunces:opsz,wght@9..144,600&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <div class="bg-orb orb-a"></div>
    <div class="bg-orb orb-b"></div>

    <main class="page">
      <header class="hero reveal">
        <p class="eyebrow">Automatic Short Answer Grading</p>
        <h1>ASAG Studio</h1>
        <p class="subtitle">Train-ready project with live grading API, batch scoring, and model-aware UI.</p>
      </header>

      <section class="grid">
        <article class="card reveal delay-1">
          <h2>Single Answer Grading</h2>
          <label for="reference">Reference answer</label>
          <textarea id="reference" rows="6">Photosynthesis is the process by which plants convert light energy into chemical energy.</textarea>

          <label for="student">Student answer</label>
          <textarea id="student" rows="6">Plants use sunlight to make food through photosynthesis.</textarea>

          <button id="predictBtn" class="btn-primary">Predict Score</button>
          <div id="predictResult" class="result"></div>
        </article>

        <article class="card reveal delay-2">
          <h2>Batch Grading</h2>
          <p class="hint">Upload CSV with columns: <code>reference_answer</code>, <code>student_answer</code>.</p>
          <input id="batchFile" type="file" accept=".csv" />
          <button id="batchBtn" class="btn-secondary">Run Batch Prediction</button>
          <div id="batchResult" class="result"></div>
        </article>

        <article class="card reveal delay-3 wide">
          <h2>Model Status</h2>
          <button id="statusBtn" class="btn-secondary">Refresh Model Info</button>
          <pre id="statusPanel" class="status">Loading...</pre>
        </article>
      </section>
    </main>

    <script src="/static/app.js"></script>
  </body>
</html>
